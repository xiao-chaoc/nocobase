name: car-rental-collection-test

services:
  postgres:
    image: postgres:16
    container_name: car-rental-collection-test-postgres
    restart: unless-stopped
    env_file:
      - .env.car-rental-collection-test
    ports:
      - '5432:5432'
    volumes:
      - ./storage-test/car-rental-postgres:/var/lib/postgresql/data
    networks:
      - car-rental-collection-test
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  car-rental-collection-test:
    name: car-rental-collection-test
